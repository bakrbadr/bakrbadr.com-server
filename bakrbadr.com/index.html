<!DOCTYPE html>
<html>
<head>
    <title>This domain was on Cloudflare</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    
    <style>
        .gallery img {
            width: 100vw;
            height: 100vh;
            margin: 10px;
            border: 1px solid #ccc;
            padding: 5px;
        }
        .verification-box {
            margin: 20px;
            padding: 20px;
            border: 2px dashed #0051ff;
            text-align: center;
        }
        button {
            background-color: #0051ff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <h1>Thats my com website (Cloudflare)</h1>

    <div class="verification-box">
        <p>Before seeing the gallery, please verify:</p>
        <button id="btn-verify" onclick="spawnTurnstile()">Click to Verify</button>
        
        <div id="my-widget-container" style="margin-top: 15px;"></div>
    </div>

    <p>Here are some images</p>
    <div class="gallery">
        <img src="images/parachute.jpg">
        <img src="images/sunset.jpg">
        </div>

    <script>
        function spawnTurnstile() {
            // Disable the button so the user doesn't click it multiple times
            document.getElementById('btn-verify').disabled = true;

            // 3. Manually trigger the widget
            turnstile.render('#my-widget-container', {
                sitekey: '0x4AAAAAAC1siG6ryUov5SkK', // Using your specific sitekey
                theme: 'light',
                callback: function(token) {
                    console.log("Passed! Token generated:", token);
                    alert("Validation successful!");
                    // You can now redirect the user or reveal content here
                },
                'error-callback': function() {
                    alert("Something went wrong. Try again.");
                    document.getElementById('btn-verify').disabled = false;
                }
            });
        }
    </script>
</body>
</html>
